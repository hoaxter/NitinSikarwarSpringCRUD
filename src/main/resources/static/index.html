<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Information Portal</title>
    <meta name="description" content="Manage student records — add, view, update, and delete entries through an intuitive dashboard.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="shell">

        <!-- Top bar -->
        <nav class="topbar">
            <div class="brand">
                <div class="brand-badge">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                    </svg>
                </div>
                <span class="brand-text">Student Portal</span>
            </div>
            <button class="action-btn action-btn--filled" id="btnNew" onclick="showForm()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New Student
            </button>
        </nav>

        <!-- Summary cards -->
        <section class="summary-row">
            <div class="summary-card">
                <div class="summary-icon summary-icon--blue">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                </div>
                <div class="summary-data">
                    <span class="summary-number" id="metricTotal">0</span>
                    <span class="summary-label">Total Students</span>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon summary-icon--purple">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                </div>
                <div class="summary-data">
                    <span class="summary-number" id="metricCourses">0</span>
                    <span class="summary-label">Courses</span>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon summary-icon--green">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </div>
                <div class="summary-data">
                    <span class="summary-number summary-live" id="metricStatus">Active</span>
                    <span class="summary-label">Server</span>
                </div>
            </div>
        </section>

        <!-- Search -->
        <div class="search-bar">
            <svg class="search-ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="filterInput" class="search-input" placeholder="Search students..." oninput="applyFilter()">
        </div>

        <!-- Data table -->
        <section class="panel">
            <div class="panel-top">
                <h2 class="panel-title">All Students</h2>
                <span class="pill" id="rowBadge">0</span>
            </div>
            <div class="table-wrap" id="gridWrap">
                <table class="data-table" id="dataGrid">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Course</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="gridBody"></tbody>
                </table>
            </div>
            <div class="empty-box" id="placeholder" style="display:none">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <p class="empty-heading">No students yet</p>
                <p class="empty-hint">Click <strong>New Student</strong> to add the first entry.</p>
            </div>
        </section>
    </div>

    <!-- Form drawer -->
    <div class="overlay" id="overlay" onclick="hideForm(event)">
        <div class="drawer" onclick="event.stopPropagation()">
            <div class="drawer-head">
                <h3 id="drawerTitle">New Student</h3>
                <button class="close-btn" id="btnCloseDrawer" onclick="hideForm()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <form id="entryForm" onsubmit="submitEntry(event)">
                <input type="hidden" id="entryId">
                <label class="lbl" for="entryName">Name</label>
                <input class="inp" type="text" id="entryName" placeholder="e.g. Pagati Sharma" required>

                <label class="lbl" for="entryEmail">Email</label>
                <input class="inp" type="email" id="entryEmail" placeholder="e.g. pagati@college.com" required>

                <label class="lbl" for="entryCourse">Course</label>
                <input class="inp" type="text" id="entryCourse" placeholder="e.g. Computer Science" required>

                <div class="drawer-footer">
                    <button type="button" class="action-btn action-btn--outline" id="btnFormCancel" onclick="hideForm()">Cancel</button>
                    <button type="submit" class="action-btn action-btn--filled" id="btnFormSave"><span id="saveBtnLabel">Save</span></button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete confirm -->
    <div class="overlay" id="confirmOverlay" onclick="hideConfirm(event)">
        <div class="drawer drawer--sm" onclick="event.stopPropagation()">
            <div class="confirm-body">
                <div class="confirm-badge">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </div>
                <h3>Delete Student?</h3>
                <p id="confirmName"></p>
                <p class="confirm-sub">This action is permanent.</p>
            </div>
            <div class="drawer-footer">
                <button class="action-btn action-btn--outline" id="btnConfirmCancel" onclick="hideConfirm()">Cancel</button>
                <button class="action-btn action-btn--danger" id="btnConfirmYes" onclick="performDelete()">Delete</button>
            </div>
        </div>
    </div>

    <!-- Toast area -->
    <div id="toastArea" class="toast-area"></div>

    <script src="/js/app.js"></script>
</body>
</html>
